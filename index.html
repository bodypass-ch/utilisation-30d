<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Votre sélection — Body Pass</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Source+Sans+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bp-cream: #FBF7F1;
      --bp-cream-deep: #F2EBDF;
      --bp-burgundy: #A3695B;
      --bp-burgundy-dark: #8B5448;
      --bp-champagne: #C2B59B;
      --bp-text: #2C2826;
      --bp-text-soft: #54504E;
      --bp-text-mute: #7A7470;
      --bp-divider: #E5DBC8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background-color: var(--bp-cream);
      color: var(--bp-text);
      font-family: 'Source Sans Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 64px 32px 64px;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding-bottom: 24px;
      margin-bottom: 28px;
    }
    .hero .eyebrow {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bp-burgundy);
      font-weight: 600;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 400;
      font-size: 46px;
      line-height: 1.18;
      color: var(--bp-text);
      margin: 0 0 22px 0;
      letter-spacing: -0.01em;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--bp-burgundy);
    }
    .hero p {
      font-size: 17px;
      color: var(--bp-text-soft);
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* SECTION HEADERS */
    .section-head {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 28px;
    }
    .section-head .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bp-burgundy);
      font-weight: 600;
      white-space: nowrap;
    }
    .section-head .rule {
      flex: 1;
      height: 1px;
      background: var(--bp-divider);
    }

    /* DER_ETAB — featured horizontal card */
    .featured {
      background: #FFFFFF;
      border: 1px solid var(--bp-divider);
      border-radius: 2px;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      overflow: hidden;
      margin-bottom: 72px;
      transition: transform 200ms ease, box-shadow 200ms ease;
    }
    .featured:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(44, 40, 38, 0.08);
    }
    .featured .media {
      background-color: var(--bp-cream-deep);
      background-size: cover;
      background-position: center;
      min-height: 320px;
    }
    .featured .body {
      padding: 44px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .featured .category {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--bp-text-mute);
      margin-bottom: 12px;
    }
    .featured h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 500;
      font-size: 32px;
      line-height: 1.2;
      color: var(--bp-text);
      margin: 0 0 12px 0;
    }
    .featured .meta {
      font-size: 14px;
      color: var(--bp-text-soft);
      margin-bottom: 18px;
    }
    .featured .meta .sep {
      color: var(--bp-divider);
      margin: 0 8px;
    }
    .featured .blurb {
      font-size: 16px;
      color: var(--bp-text-soft);
      line-height: 1.6;
      margin: 0 0 28px 0;
    }
    .featured .cta {
      display: inline-block;
      align-self: flex-start;
      padding: 14px 28px;
      background: var(--bp-burgundy);
      color: #FFFFFF;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background 150ms ease;
    }
    .featured .cta:hover { background: var(--bp-burgundy-dark); }

    /* CARDS — 3 similaires */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }
    .card {
      background: #FFFFFF;
      border: 1px solid var(--bp-divider);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 200ms ease, box-shadow 200ms ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(44, 40, 38, 0.08);
    }
    .card .media {
      aspect-ratio: 4 / 3;
      background-color: var(--bp-cream-deep);
      background-size: cover;
      background-position: center;
    }
    .card .body {
      padding: 24px 24px 28px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card .category {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--bp-text-mute);
      margin-bottom: 10px;
    }
    .card h3 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 500;
      font-size: 22px;
      line-height: 1.25;
      color: var(--bp-text);
      margin: 0 0 8px 0;
    }
    .card .meta {
      font-size: 14px;
      color: var(--bp-text-soft);
      margin-bottom: 16px;
    }
    .card .meta .sep {
      color: var(--bp-divider);
      margin: 0 8px;
    }
    .card .blurb {
      font-size: 15px;
      color: var(--bp-text-soft);
      line-height: 1.55;
      margin: 0 0 24px 0;
      flex: 1;
    }
    .card .cta {
      display: inline-block;
      padding: 13px 22px;
      background: transparent;
      color: var(--bp-burgundy);
      border: 1px solid var(--bp-burgundy);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      border-radius: 2px;
      transition: all 150ms ease;
    }
    .card .cta:hover {
      background: var(--bp-burgundy);
      color: #FFFFFF;
    }

    /* FOOTER */
    .footer {
      margin-top: 96px;
      padding-top: 56px;
      border-top: 1px solid var(--bp-divider);
      text-align: center;
    }
    .footer img {
      width: 240px;
      height: auto;
      display: block;
      margin: 0 auto 10px;
    }
    .footer .baseline {
      font-size: 13px;
      color: var(--bp-text-soft);
      margin-bottom: 4px;
    }
    .footer .signature {
      font-size: 12px;
      color: var(--bp-text-mute);
      font-style: italic;
    }

    /* STATES (loading / error) */
    .state-screen {
      text-align: center;
      padding: 120px 32px;
      max-width: 540px;
      margin: 0 auto;
    }
    .state-screen .eyebrow {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bp-burgundy);
      font-weight: 600;
      margin-bottom: 18px;
    }
    .state-screen h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 34px;
      line-height: 1.2;
      color: var(--bp-text);
      margin: 0 0 18px 0;
    }
    .state-screen p {
      font-size: 16px;
      color: var(--bp-text-soft);
      line-height: 1.6;
      margin: 0;
    }
    .state-screen a {
      color: var(--bp-burgundy);
    }

    /* MOBILE */
    @media (max-width: 860px) {
      .cards { grid-template-columns: 1fr; }
      .featured { grid-template-columns: 1fr; }
      .featured .media { min-height: 220px; }
      .featured .body { padding: 32px 28px; }
      .featured h2 { font-size: 26px; }
      .hero h1 { font-size: 34px; }
      .page { padding: 44px 20px 56px; }
    }
  </style>
</head>

<body>
  <div class="page" id="app">
    <!-- ÉTAT INITIAL : loading -->
    <div class="state-screen" id="loading">
      <div class="eyebrow">Body Pass</div>
      <h2>Un instant…</h2>
    </div>
  </div>

  <!-- TEMPLATE: carte recommandation -->
  <template id="tpl-card">
    <article class="card">
      <div class="media"></div>
      <div class="body">
        <div class="category"></div>
        <h3></h3>
        <div class="meta"></div>
        <p class="blurb"></p>
        <a class="cta" href="#" target="_blank" rel="noopener">En savoir plus</a>
      </div>
    </article>
  </template>

  <script>
    const FALLBACK_IMG = "https://bodypass-ch.github.io/bodypass-assets/etablissements/_default.jpg";
    const app = document.getElementById("app");
    const params = new URLSearchParams(location.search);
    const token = params.get("t");

    function showState(eyebrow, title, bodyHtml) {
      app.innerHTML = `
        <div class="state-screen">
          <div class="eyebrow">${eyebrow}</div>
          <h2>${title}</h2>
          ${bodyHtml || ""}
        </div>`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function metaLine(s) {
      return [s.category, s.canton].filter(Boolean).join(" · ");
    }

    function statsLine(s) {
      const parts = [];
      if (s.visites != null && s.visites !== "") parts.push(`${s.visites} visites`);
      if (s.note != null && s.note !== "") parts.push(`Note ${s.note}`);
      return parts.join(' <span class="sep">·</span> ');
    }

    function todayFr() {
      try {
        return new Date().toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });
      } catch (e) {
        return "";
      }
    }

    function mediaStyle(url) {
      const safe = (url || FALLBACK_IMG).replace(/"/g, "%22");
      return `background-image: linear-gradient(135deg, rgba(44,40,38,0.25), rgba(44,40,38,0.05)), url('${safe}');`;
    }

    function render(data) {
      const name = data.name || "";
      const last = data.last_visit || null;
      const suggestions = data.suggestions || [];

      app.innerHTML = "";

      // HERO
      const hero = document.createElement("section");
      hero.className = "hero";
      const lastName = last && last.etab_name ? last.etab_name : "votre dernier établissement";
      hero.innerHTML = `
        <div class="eyebrow">Votre sélection — ${todayFr()}</div>
        <h1>Bonjour ${name},<br>votre prochaine pause <em>bien-être</em> vous attend.</h1>
        <p>Cela fait déjà 30 jours depuis votre passage au ${lastName}. On vous a préparé une sélection rien que pour vous, avec des expériences qu'on pense que vous allez adorer.</p>`;
      app.appendChild(hero);

      // DERNIÈRE VISITE
      if (last && last.etab_name) {
        const sectionHead = document.createElement("div");
        sectionHead.className = "section-head";
        sectionHead.innerHTML = `<div class="label">Votre dernière visite</div><div class="rule"></div>`;
        app.appendChild(sectionHead);

        const featured = document.createElement("article");
        featured.className = "featured";
        const photoUrl = last.photo_url || last.etab_photo_url;
        const lastUrl = last.etab_url_public || (last.etab_slug ? `https://www.bodypass.ch/etablissements/${last.etab_slug}/` : null);
        const lastStats = statsLine(last);
        featured.innerHTML = `
          <div class="media" style="${mediaStyle(photoUrl)}"></div>
          <div class="body">
            <div class="category">${metaLine(last) || " "}</div>
            <h2>${last.etab_name}</h2>
            ${lastStats ? `<div class="meta">${lastStats}</div>` : ""}
            ${last.blurb ? `<p class="blurb">${last.blurb}</p>` : ""}
            ${lastUrl ? `<a href="${lastUrl}" class="cta" target="_blank" rel="noopener">Y retourner</a>` : ""}
          </div>`;
        app.appendChild(featured);
      }

      // SECTION SUGGESTIONS
      const sugHead = document.createElement("div");
      sugHead.className = "section-head";
      sugHead.innerHTML = `<div class="label">À découvrir</div><div class="rule"></div>`;
      app.appendChild(sugHead);

      const grid = document.createElement("section");
      grid.className = "cards";
      const tpl = document.getElementById("tpl-card");
      suggestions.forEach(s => {
        const node = tpl.content.cloneNode(true);
        node.querySelector(".media").setAttribute("style", mediaStyle(s.etab_photo_url || s.photo_url));
        node.querySelector(".category").textContent = metaLine(s) || " ";
        node.querySelector("h3").textContent = s.etab_name || "";
        const metaEl = node.querySelector(".meta");
        const stats = statsLine(s);
        if (stats) {
          metaEl.innerHTML = stats;
        } else {
          metaEl.remove();
        }
        const blurbEl = node.querySelector(".blurb");
        if (s.blurb) {
          blurbEl.textContent = s.blurb;
        } else {
          blurbEl.remove();
        }
        const cta = node.querySelector(".cta");
        const sugUrl = s.etab_url_public || (s.etab_slug ? `https://www.bodypass.ch/etablissements/${s.etab_slug}/` : null);
        if (sugUrl) {
          cta.href = sugUrl;
        } else {
          cta.style.display = "none";
        }
        grid.appendChild(node);
      });
      app.appendChild(grid);

      // FOOTER
      const footer = document.createElement("div");
      footer.className = "footer";
      footer.innerHTML = `
        <a href="https://www.bodypass.ch" target="_blank" rel="noopener">
          <img src="https://mcusercontent.com/2fe53ca99e3207a69a56a254e/images/7eef1284-dc57-0b12-61e9-7b986171923e.png" alt="Body Pass" />
        </a>
        <div class="baseline">Body Pass, le passeport pour le bien-être</div>
        <div class="signature">Préparé pour ${name} · ${todayFr()}</div>`;
      app.appendChild(footer);
    }

    if (!token) {
      showState(
        "Body Pass",
        "Cette page a expiré",
        `<p>Le lien n'est plus valide. Retrouvez vos avantages sur <a href="https://www.bodypass.ch">bodypass.ch</a>.</p>`
      );
    } else {
      fetch(`data/${token}.json`, { cache: "no-store" })
        .then(r => { if (!r.ok) throw new Error("404"); return r.json(); })
        .then(render)
        .catch(() => showState(
          "Body Pass",
          "Cette page a expiré",
          `<p>Ce lien n'est plus actif. Retrouvez vos avantages sur <a href="https://www.bodypass.ch">bodypass.ch</a>.</p>`
        ));
    }
  </script>
</body>
</html>
